[package]
name = "rust_native_app"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
android-activity = "0.6"
log = "0.4"
android_logger = "0.13"

[package.metadata.android]
package = "com.odfiz.rustnative"
label = "RustNativeApp"
build_targets = ["aarch64-linux-android"]
# Memaksa versi yang sering dicari cargo-apk secara default
target_sdk_version = 30
min_sdk_version = 21
build_tools_version = "30.0.3"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
