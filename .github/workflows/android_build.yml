name: Build Rust Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android

    - name: Install cargo-apk
      run: cargo install cargo-apk

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: sdkmanager "ndk;26.1.10909125"

    - name: Generate Dummy Keystore
      run: |
        keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Build APK (Release Mode)
      run: |
        export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125
        cargo apk build --release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: odfiz-net-simulator
        path: target/release/apk/*.apk
